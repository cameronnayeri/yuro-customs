  <script>
    // Nav toggle
    const toggle = document.querySelector('.nav__toggle');
    const links  = document.querySelector('.nav__links');
    toggle.addEventListener('click', () => {
      const open = links.classList.toggle('is-open');
      toggle.setAttribute('aria-expanded', open);
      toggle.innerHTML = open ? '&#215;' : '&#9776;';
    });

    // Lightbox
    const overlay = document.getElementById('lightbox');
    const lbImg   = overlay.querySelector('img');
    const figures = [...document.querySelectorAll('.gallery figure')];
    let current   = 0;

    function open(i) {
      current = (i + figures.length) % figures.length;
      lbImg.src = figures[current].querySelector('img').src;
      lbImg.alt = figures[current].querySelector('img').alt;
      overlay.classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }
    function close() {
      overlay.classList.remove('is-open');
      document.body.style.overflow = '';
    }

    figures.forEach((fig, i) => fig.addEventListener('click', () => open(i)));
    overlay.querySelector('.lb-close').addEventListener('click', close);
    overlay.querySelector('.lb-prev').addEventListener('click', (e) => { e.stopPropagation(); open(current - 1); });
    overlay.querySelector('.lb-next').addEventListener('click', (e) => { e.stopPropagation(); open(current + 1); });
    overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
    document.addEventListener('keydown', (e) => {
      if (!overlay.classList.contains('is-open')) return;
      if (e.key === 'Escape')     close();
      if (e.key === 'ArrowLeft')  open(current - 1);
      if (e.key === 'ArrowRight') open(current + 1);
    });
  </script>
